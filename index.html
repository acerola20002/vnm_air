<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CXR 국제선 전광판</title>

<style>
body { background: #000; color: #ffcc00; font-family: sans-serif; padding: 10px; margin: 0; }
.header { text-align: center; margin-bottom: 20px; padding: 20px 10px; border-bottom: 1px solid #222; }
.update-tag { color: #888; font-size: 0.9em; }

.tab-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
.tab-btn { padding: 15px 40px; font-size: 1.2em; cursor: pointer; background: #222; border: 2px solid #444; color: #888; border-radius: 5px; }
.tab-btn.active { background: #ffcc00; color: #000; }

table { width: 100%; border-collapse: collapse; display: none; }
table.active { display: table; }
th { background: #333; color: #fff; padding: 12px; }
td { padding: 12px; border-bottom: 1px solid #222; text-align: center; }
</style>
</head>

<body>

<div class="header">
    <h1>✈️ CAM RANH (CXR) INTERNATIONAL</h1>

    <div id="update-notice" class="update-tag">데이터 로딩 중...</div>

    <div style="margin-top:15px; color:#bbb; font-size:0.8em; line-height:1.6; border-top: 1px solid #444; padding-top:10px;">
    ⚠️ 본 전광판은 FlightRadar24 데이터를 기반으로 개인적인 여행 편의를 위해 제작되었습니다.<br>
    데이터는 10분 간격으로 자동 업데이트되나 시스템 환경에 따라 지연될 수 있습니다.<br>
    <strong>정확한 운항 정보는 반드시 해당 항공사 공식 홈페이지를 확인해 주시기 바랍니다.</strong>
    </div>
</div>

<div class="tab-container">
    <div id="btn-arr" class="tab-btn active" onclick="showTab('도착')">▼ 도착</div>
    <div id="btn-dep" class="tab-btn" onclick="showTab('출발')">▲ 출발</div>
</div>

<table id="main-table">
<thead>
<tr>
<th>일시</th><th>편명</th><th>도시</th><th>상태</th>
</tr>
</thead>
<tbody id="table-body"></tbody>
</table>

<script>
    /**
     * 1. 캐시 방지를 위해 현재 시간(Timestamp)을 붙여 data.js 로드
     */
    const script = document.createElement("script");
    script.src = `data.js?v=${Date.now()}`;
    document.head.appendChild(script);

    /**
     * 2. 데이터(data.js) 로드가 완료된 후 실행될 로직
     */
    script.onload = function() {
        if (typeof flightInfo !== 'undefined') {
            // 업데이트 시간 텍스트 삽입
            document.getElementById('update-notice').innerText =
                `※ 모든 시간은 베트남 현지 시간 기준 / 마지막 업데이트: ${flightInfo.lastUpdate}`;
            
            // 초기 화면(도착 탭) 그리기
            showTab('도착');
        } else {
            document.getElementById('update-notice').innerText = "데이터를 불러오지 못했습니다.";
        }
    };

    /**
     * 3. 탭 전환 및 데이터 출력 함수
     */
    function showTab(type) {
        // 버튼 활성화 상태 변경
        document.getElementById('btn-arr').classList.toggle('active', type === '도착');
        document.getElementById('btn-dep').classList.toggle('active', type === '출발');

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        // 필터링된 데이터 가져오기
        const filtered = flightInfo.data.filter(f => f.type === type);

        filtered.forEach(f => {
            let color = "#fff";

            // 상태별 텍스트 색상 지정
            if (f.status.includes("지연")) color = "#ff4444";
            if (f.status.includes("탑승중")) color = "#00ffcc";
            if (f.status.includes("출발완료") || f.status.includes("도착완료")) color = "#00ff00";

            const row = `<tr>
                <td style="color:#aaa">${f.time}</td>
                <td>${f.flight}</td>
                <td>${f.city}</td>
                <td style="color:${color}; font-weight:bold;">${f.status}</td>
            </tr>`;

            tbody.innerHTML += row;
        });

        // 테이블 보이기
        document.getElementById('main-table').classList.add('active');
    }

    /**
     * 4. 5분 자동 새로고침 (새로고침 시 Date.now() 값이 바뀌어 새 데이터를 가져옴)
     */
    setInterval(() => {
        location.reload();
    }, 300000);
</script>

</body>
</html>
