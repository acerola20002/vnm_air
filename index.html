<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>항공 전광판 서비스 통합 안내</title>
    <style>
        /* 기본 스타일 */
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #050505; color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; letter-spacing: -0.02em; }
        .container { max-width: 500px; width: 90%; text-align: center; }
        
        /* 카드 디자인 */
        .notice-card { background: #0a0a0a; border: 1px solid #222; padding: 40px 20px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }
        .icon-box { font-size: 3.5rem; margin-bottom: 25px; }
        
        /* 텍스트 스타일 */
        h1 { color: #ffcc00; font-size: 1.8rem; font-weight: 900; margin: 0 0 15px 0; letter-spacing: 1px; }
        .highlight { color: #fff; font-weight: bold; }
        p { color: #888; line-height: 1.7; font-size: 1.05rem; margin-bottom: 35px; }
        
        /* 버튼 스타일 */
        .link-btn { 
            display: inline-block; padding: 18px 35px; background: #ffcc00; color: #000; 
            text-decoration: none; font-weight: 800; border-radius: 10px; 
            font-size: 1.1rem; transition: all 0.3s; box-shadow: 0 4px 15px rgba(255, 204, 0, 0.2);
        }
        .link-btn:hover { background: #fff; transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 255, 255, 0.2); }
        
        .footer-text { margin-top: 25px; font-size: 0.85rem; color: #444; }
    </style>
</head>
<body>

<div class="container">
    <div class="notice-card">
        <div class="icon-box">🌏</div>
        <h1>서비스 통합 안내</h1>
        <p>
            기존 개별 공항 서비스가<br>
            <span class="highlight">아시아 6개국 통합 항공 스케줄러</span>로<br>
            새롭게 업데이트되었습니다.
        </p>
        
        <a href="https://acerola20002.github.io/asia_air/" class="link-btn">통합 전광판 확인하기</a>
        
        <div class="footer-text">
            일본, 베트남, 태국, 대만, 필리핀, 중국 정보를<br>한곳에서 확인하실 수 있습니다.
        </div>
    </div>
</div>

</body>
</html>
