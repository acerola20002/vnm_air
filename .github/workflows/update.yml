name: Update Flight Data

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
         python -m pip install --upgrade pip
         pip install FlightRadarAPI beautifulsoup4

      - name: Run Scraper
        # 여기서도 python -m으로 패키지를 인식하도록 시도하거나 직접 실행
        run: python scraper.py

- name: Commit and Push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add data.js
          # 충돌 방지를 위해 원격 저장소의 최신 상태를 가져오되, 로컬(봇)의 data.js를 우선시함
          git fetch origin main
          git checkout origin/main data.js || true # 파일이 없어도 무시
          git add data.js
          git commit -m "Update flight data $(date)" || echo "No changes to commit"
          git push origin main --force  # 강제로 밀어넣어 충돌 해결
